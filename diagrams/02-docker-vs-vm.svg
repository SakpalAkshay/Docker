<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="720" height="380" fill="#f8fafc"/>
  <text x="360" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Docker Containers vs Virtual Machines</text>

  <!-- VM SIDE -->
  <text x="180" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#b91c1c">VIRTUAL MACHINES ❌</text>

  <rect x="40" y="68" width="80" height="46" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="80" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">App A</text>
  <text x="80" y="104" text-anchor="middle" font-size="9" fill="#dc2626">Libs/Deps</text>

  <rect x="130" y="68" width="80" height="46" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="170" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">App B</text>
  <text x="170" y="104" text-anchor="middle" font-size="9" fill="#dc2626">Libs/Deps</text>

  <rect x="220" y="68" width="80" height="46" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="260" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">App C</text>
  <text x="260" y="104" text-anchor="middle" font-size="9" fill="#dc2626">Libs/Deps</text>

  <rect x="40" y="120" width="80" height="42" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="80" y="139" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">GUEST OS</text>
  <text x="80" y="154" text-anchor="middle" font-size="8" fill="#991b1b">~GBs!</text>

  <rect x="130" y="120" width="80" height="42" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="170" y="139" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">GUEST OS</text>
  <text x="170" y="154" text-anchor="middle" font-size="8" fill="#991b1b">~GBs!</text>

  <rect x="220" y="120" width="80" height="42" rx="4" fill="#fecaca" stroke="#dc2626" stroke-width="2"/>
  <text x="260" y="139" text-anchor="middle" font-size="10" font-weight="700" fill="#7f1d1d">GUEST OS</text>
  <text x="260" y="154" text-anchor="middle" font-size="8" fill="#991b1b">~GBs!</text>

  <rect x="40" y="168" width="260" height="36" rx="4" fill="#f87171" stroke="#b91c1c" stroke-width="2"/>
  <text x="170" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">HYPERVISOR</text>

  <rect x="40" y="210" width="260" height="32" rx="4" fill="#e2e8f0" stroke="#64748b"/>
  <text x="170" y="231" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">HOST OS</text>

  <rect x="40" y="248" width="260" height="32" rx="4" fill="#cbd5e1" stroke="#475569"/>
  <text x="170" y="269" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">HARDWARE</text>

  <text x="170" y="300" text-anchor="middle" font-size="10" fill="#b91c1c">🐌 Slow boot · High disk usage</text>
  <text x="170" y="316" text-anchor="middle" font-size="10" fill="#b91c1c">💾 Resources split &amp; wasted</text>
  <text x="170" y="332" text-anchor="middle" font-size="10" fill="#b91c1c">📦 Encapsulates the WHOLE machine</text>
  <text x="170" y="348" text-anchor="middle" font-size="10" fill="#b91c1c">🔁 Sharing/rebuilding = challenging</text>

  <!-- Divider -->
  <line x1="360" y1="45" x2="360" y2="360" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- DOCKER SIDE -->
  <text x="540" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">DOCKER CONTAINERS ✅</text>

  <rect x="400" y="68" width="80" height="60" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="440" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">App A</text>
  <text x="440" y="107" text-anchor="middle" font-size="9" fill="#16a34a">Libs/Deps</text>
  <text x="440" y="121" text-anchor="middle" font-size="8" fill="#22c55e">(only what's needed)</text>

  <rect x="490" y="68" width="80" height="60" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="530" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">App B</text>
  <text x="530" y="107" text-anchor="middle" font-size="9" fill="#16a34a">Libs/Deps</text>
  <text x="530" y="121" text-anchor="middle" font-size="8" fill="#22c55e">(only what's needed)</text>

  <rect x="580" y="68" width="80" height="60" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="620" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">App C</text>
  <text x="620" y="107" text-anchor="middle" font-size="9" fill="#16a34a">Libs/Deps</text>
  <text x="620" y="121" text-anchor="middle" font-size="8" fill="#22c55e">(only what's needed)</text>

  <text x="530" y="145" text-anchor="middle" font-size="10" font-style="italic" fill="#059669">NO Guest OS needed! 🎉</text>

  <rect x="400" y="155" width="260" height="49" rx="4" fill="#0ea5e9" stroke="#0369a1" stroke-width="2"/>
  <text x="530" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">DOCKER ENGINE</text>

  <rect x="400" y="210" width="260" height="32" rx="4" fill="#e2e8f0" stroke="#64748b"/>
  <text x="530" y="231" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">HOST OS</text>

  <rect x="400" y="248" width="260" height="32" rx="4" fill="#cbd5e1" stroke="#475569"/>
  <text x="530" y="269" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">HARDWARE</text>

  <text x="530" y="300" text-anchor="middle" font-size="10" fill="#15803d">⚡ Very fast · Low disk usage</text>
  <text x="530" y="316" text-anchor="middle" font-size="10" fill="#15803d">💚 Uses only what the app needs</text>
  <text x="530" y="332" text-anchor="middle" font-size="10" fill="#15803d">📦 Encapsulates only the APP</text>
  <text x="530" y="348" text-anchor="middle" font-size="10" fill="#15803d">🔁 Sharing/rebuilding = easy</text>
</svg>
