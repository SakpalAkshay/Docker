<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="760" height="340" fill="#f8fafc"/>
  <text x="380" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">The Docker Flow — Dockerfile → Image → Container</text>

  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#475569"/>
    </marker>
  </defs>

  <!-- Dockerfile -->
  <rect x="30" y="120" width="130" height="95" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="95" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#713f12">📄 Dockerfile</text>
  <text x="95" y="170" text-anchor="middle" font-size="9" fill="#a16207">Simple TEXT file</text>
  <text x="95" y="185" text-anchor="middle" font-size="9" fill="#a16207">with instructions</text>
  <text x="95" y="200" text-anchor="middle" font-size="9" fill="#a16207">to build an image</text>

  <line x1="165" y1="167" x2="215" y2="167" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text x="190" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">build</text>

  <!-- Image -->
  <rect x="222" y="120" width="130" height="95" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="287" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">📦 Image</text>
  <text x="287" y="170" text-anchor="middle" font-size="9" fill="#1d4ed8">SINGLE file with all</text>
  <text x="287" y="185" text-anchor="middle" font-size="9" fill="#1d4ed8">dependencies + libs</text>
  <text x="287" y="200" text-anchor="middle" font-size="9" fill="#1d4ed8">to run the program</text>

  <line x1="357" y1="167" x2="407" y2="167" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text x="382" y="158" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">run</text>

  <!-- Docker Engine badge -->
  <rect x="222" y="240" width="130" height="34" rx="6" fill="#0ea5e9" stroke="#0369a1"/>
  <text x="287" y="262" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Docker Engine</text>
  <line x1="287" y1="240" x2="287" y2="218" stroke="#0369a1" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="380" y="262" font-size="9" fill="#0369a1">↖ runs the image</text>

  <!-- Containers (multiple!) -->
  <rect x="414" y="70" width="120" height="62" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="474" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">🚢 Container 1</text>
  <text x="474" y="115" text-anchor="middle" font-size="9" fill="#16a34a">running instance</text>

  <rect x="414" y="140" width="120" height="62" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="474" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">🚢 Container 2</text>
  <text x="474" y="185" text-anchor="middle" font-size="9" fill="#16a34a">running instance</text>

  <rect x="414" y="210" width="120" height="62" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="474" y="235" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">🚢 Container 3</text>
  <text x="474" y="255" text-anchor="middle" font-size="9" fill="#16a34a">running instance</text>

  <text x="474" y="292" text-anchor="middle" font-size="10" font-style="italic" fill="#059669">ONE image → MANY containers</text>

  <!-- Registry -->
  <line x1="352" y1="140" x2="352" y2="60" stroke="#475569" stroke-width="2"/>
  <line x1="352" y1="60" x2="600" y2="60" stroke="#475569" stroke-width="2" marker-end="url(#ar)"/>
  <text x="470" y="52" text-anchor="middle" font-size="9" font-weight="600" fill="#334155">push / pull</text>

  <rect x="608" y="30" width="130" height="95" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="673" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#581c87">☁️ Registry</text>
  <text x="673" y="80" text-anchor="middle" font-size="9" fill="#7e22ce">Central repository</text>
  <text x="673" y="95" text-anchor="middle" font-size="9" fill="#7e22ce">to store &amp; distribute</text>
  <text x="673" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#7e22ce">e.g. Docker Hub</text>
</svg>
