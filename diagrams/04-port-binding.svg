<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="700" height="260" fill="#f8fafc"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Port Binding: -p HOST_PORT : CONTAINER_PORT</text>

  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- Host box -->
  <rect x="30" y="50" width="640" height="185" rx="10" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="50" y="72" font-size="12" font-weight="700" fill="#334155">🖥️ HOST MACHINE (your laptop)</text>

  <!-- Browser -->
  <rect x="55" y="90" width="140" height="70" rx="8" fill="#ffffff" stroke="#334155" stroke-width="2"/>
  <text x="125" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">🌐 Browser</text>
  <text x="125" y="137" text-anchor="middle" font-size="11" fill="#475569">localhost:3000</text>

  <!-- Arrow -->
  <line x1="200" y1="125" x2="290" y2="125" stroke="#0ea5e9" stroke-width="3" marker-end="url(#ar2)"/>
  <text x="245" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">BOUND</text>
  <text x="245" y="145" text-anchor="middle" font-size="9" fill="#0369a1">3000 → 3000</text>

  <!-- Container -->
  <rect x="300" y="80" width="340" height="130" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="320" y="102" font-size="12" font-weight="700" fill="#14532d">🚢 CONTAINER (isolated)</text>

  <rect x="330" y="115" width="280" height="70" rx="8" fill="#ffffff" stroke="#16a34a" stroke-width="2"/>
  <text x="470" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">React App</text>
  <text x="470" y="162" text-anchor="middle" font-size="11" fill="#15803d">listening on port 3000</text>
  <text x="470" y="178" text-anchor="middle" font-size="9" fill="#22c55e">(container's internal port)</text>
</svg>
