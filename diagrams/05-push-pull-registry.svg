<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="720" height="300" fill="#f8fafc"/>
  <text x="360" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Push &amp; Pull — Sharing Images via Docker Hub</text>

  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#9333ea"/>
    </marker>
  </defs>

  <!-- Developer -->
  <rect x="30" y="180" width="170" height="90" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="115" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">👨‍💻 Developer</text>
  <text x="115" y="228" text-anchor="middle" font-size="10" fill="#1d4ed8">Local Machine</text>
  <text x="115" y="248" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">📦 my-web-app:01</text>

  <!-- Registry (cloud) -->
  <ellipse cx="360" cy="90" rx="130" ry="55" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="360" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#581c87">☁️ DOCKER HUB</text>
  <text x="360" y="101" text-anchor="middle" font-size="10" fill="#7e22ce">Central Repository</text>
  <text x="360" y="118" text-anchor="middle" font-size="9" fill="#a855f7">username/web-app-demo</text>

  <!-- Push arrow -->
  <path d="M 155 175 Q 200 120 245 105" stroke="#9333ea" stroke-width="3" fill="none" marker-end="url(#ar3)"/>
  <text x="175" y="132" font-size="11" font-weight="700" fill="#7e22ce">PUSH ⬆️</text>
  <text x="163" y="147" font-size="8" fill="#a855f7">docker push</text>

  <!-- Pull arrow -->
  <path d="M 475 105 Q 520 120 565 175" stroke="#9333ea" stroke-width="3" fill="none" marker-end="url(#ar3)"/>
  <text x="512" y="132" font-size="11" font-weight="700" fill="#7e22ce">PULL ⬇️</text>
  <text x="510" y="147" font-size="8" fill="#a855f7">docker pull</text>

  <!-- Consumers -->
  <rect x="520" y="180" width="170" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="605" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">🧪 Tester / Server</text>
  <text x="605" y="224" text-anchor="middle" font-size="9" fill="#15803d">Remote Machine</text>
  <text x="605" y="240" text-anchor="middle" font-size="9" fill="#15803d">Only needs DOCKER!</text>
  <text x="605" y="257" text-anchor="middle" font-size="9" font-weight="600" fill="#15803d">docker run ✅</text>

  <text x="360" y="200" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">No Node install.</text>
  <text x="360" y="218" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">No setup.</text>
  <text x="360" y="236" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">No compatibility issues.</text>
  <text x="360" y="258" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Just works. ✅</text>
</svg>
