<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="700" height="300" fill="#f8fafc"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Docker Volume — Data Survives Container Death</text>

  <defs>
    <marker id="ar4" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- Container 1 (dead) -->
  <rect x="35" y="60" width="150" height="90" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="110" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">🚢 Container 1</text>
  <text x="110" y="105" text-anchor="middle" font-size="10" fill="#dc2626">/myapp</text>
  <text x="110" y="125" text-anchor="middle" font-size="10" fill="#dc2626">💀 STOPPED</text>
  <text x="110" y="142" text-anchor="middle" font-size="9" fill="#dc2626">(removed)</text>

  <!-- Container 2 (alive) -->
  <rect x="205" y="60" width="150" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="280" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">🚢 Container 2</text>
  <text x="280" y="105" text-anchor="middle" font-size="10" fill="#15803d">/myapp</text>
  <text x="280" y="125" text-anchor="middle" font-size="10" fill="#16a34a">▶️ RUNNING</text>

  <!-- Container 3 (future) -->
  <rect x="375" y="60" width="150" height="90" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="450" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#312e81">🚢 Container 3</text>
  <text x="450" y="105" text-anchor="middle" font-size="10" fill="#4338ca">/myapp</text>
  <text x="450" y="125" text-anchor="middle" font-size="10" fill="#6366f1">🔮 FUTURE</text>

  <!-- Arrows down to volume -->
  <line x1="110" y1="155" x2="230" y2="205" stroke="#0891b2" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ar4)"/>
  <line x1="280" y1="155" x2="280" y2="205" stroke="#0891b2" stroke-width="3" marker-end="url(#ar4)"/>
  <line x1="450" y1="155" x2="330" y2="205" stroke="#0891b2" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ar4)"/>

  <!-- Volume -->
  <rect x="150" y="212" width="260" height="65" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="3"/>
  <text x="280" y="238" text-anchor="middle" font-size="13" font-weight="700" fill="#164e63">💾 VOLUME: "my-volume"</text>
  <text x="280" y="258" text-anchor="middle" font-size="10" fill="#0e7490">user_info.txt — MANAGED BY DOCKER</text>
  <text x="280" y="272" text-anchor="middle" font-size="9" font-weight="600" fill="#0891b2">Lives OUTSIDE containers → NEVER vanishes ✅</text>

  <!-- Explanation -->
  <rect x="435" y="180" width="235" height="100" rx="8" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="552" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">🔑 Key Idea</text>
  <text x="447" y="224" font-size="9" fill="#854d0e">A common, shareable directory</text>
  <text x="447" y="240" font-size="9" fill="#854d0e">managed by Docker, sitting</text>
  <text x="447" y="256" font-size="9" fill="#854d0e">OUTSIDE the container.</text>
  <text x="447" y="273" font-size="9" font-weight="600" fill="#a16207">Program dies → file survives ✅</text>
</svg>
