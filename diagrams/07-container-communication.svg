<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 740 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="740" height="400" fill="#f8fafc"/>
  <text x="370" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">3 Types of Container Communication</text>

  <defs>
    <marker id="ar5" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#334155"/>
    </marker>
  </defs>

  <!-- CASE 1 -->
  <rect x="20" y="42" width="700" height="105" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="35" y="63" font-size="12" font-weight="700" fill="#1e3a8a">1️⃣ Container ↔ INTERNET (external API / website)</text>

  <rect x="60" y="75" width="120" height="55" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="120" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">🚢 Container</text>
  <text x="120" y="116" text-anchor="middle" font-size="9" fill="#3b82f6">Python App</text>

  <line x1="185" y1="102" x2="285" y2="102" stroke="#334155" stroke-width="2" marker-end="url(#ar5)"/>
  <text x="235" y="95" text-anchor="middle" font-size="9" fill="#334155">HTTP request</text>

  <rect x="290" y="75" width="130" height="55" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="355" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">🌐 External API</text>
  <text x="355" y="116" text-anchor="middle" font-size="9" fill="#a16207">catfact.ninja</text>

  <rect x="450" y="72" width="250" height="62" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="575" y="93" text-anchor="middle" font-size="10" font-weight="700" fill="#14532d">✅ WORKS OUT OF THE BOX</text>
  <text x="575" y="112" text-anchor="middle" font-size="9" fill="#15803d">No special config needed.</text>
  <text x="575" y="127" text-anchor="middle" font-size="9" fill="#15803d">Just RUN pip install &lt;pkg&gt;</text>

  <!-- CASE 2 -->
  <rect x="20" y="157" width="700" height="105" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="35" y="178" font-size="12" font-weight="700" fill="#713f12">2️⃣ Container ↔ HOST MACHINE (local DB / local service)</text>

  <rect x="60" y="190" width="120" height="55" rx="6" fill="#fef3c7" stroke="#d97706"/>
  <text x="120" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#78350f">🚢 Container</text>
  <text x="120" y="231" text-anchor="middle" font-size="9" fill="#d97706">Python App</text>

  <line x1="185" y1="217" x2="285" y2="217" stroke="#334155" stroke-width="2" marker-end="url(#ar5)"/>

  <rect x="290" y="190" width="130" height="55" rx="6" fill="#e2e8f0" stroke="#64748b"/>
  <text x="355" y="213" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">🖥️ Host MySQL</text>
  <text x="355" y="231" text-anchor="middle" font-size="9" fill="#64748b">on your laptop</text>

  <rect x="450" y="187" width="250" height="62" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="575" y="206" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">❌ "localhost" FAILS!</text>
  <text x="575" y="224" text-anchor="middle" font-size="9" fill="#dc2626">Use instead:</text>
  <text x="575" y="240" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">host.docker.internal</text>

  <!-- CASE 3 -->
  <rect x="20" y="272" width="700" height="115" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="35" y="293" font-size="12" font-weight="700" fill="#14532d">3️⃣ Container ↔ Container (multi-container app)</text>

  <rect x="60" y="305" width="120" height="60" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="120" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">🚢 my-py-app</text>
  <text x="120" y="347" text-anchor="middle" font-size="9" fill="#16a34a">Python</text>

  <line x1="185" y1="335" x2="285" y2="335" stroke="#334155" stroke-width="2" marker-end="url(#ar5)"/>

  <rect x="290" y="305" width="130" height="60" rx="6" fill="#dcfce7" stroke="#16a34a"/>
  <text x="355" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">🚢 mysql-db</text>
  <text x="355" y="347" text-anchor="middle" font-size="9" fill="#16a34a">MySQL</text>

  <rect x="450" y="300" width="250" height="72" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="575" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#1e3a8a">✅ Use a DOCKER NETWORK</text>
  <text x="575" y="338" text-anchor="middle" font-size="9" fill="#1d4ed8">Put both on the same network →</text>
  <text x="575" y="354" text-anchor="middle" font-size="9" fill="#1d4ed8">target by CONTAINER NAME</text>
  <text x="575" y="368" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">host = "mysql-db"</text>
</svg>
