<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="700" height="280" fill="#f8fafc"/>
  <text x="350" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Docker Network — Containers Talk by NAME</text>

  <defs>
    <marker id="ar6" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Network box -->
  <rect x="60" y="55" width="580" height="165" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="80" y="80" font-size="13" font-weight="700" fill="#1e3a8a">🌐 NETWORK: "my-net"  (bridge)</text>

  <!-- Python container -->
  <rect x="110" y="100" width="180" height="95" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">🚢 my-py-app</text>
  <text x="200" y="149" text-anchor="middle" font-size="10" fill="#1d4ed8">Python application</text>
  <text x="200" y="172" text-anchor="middle" font-size="10" font-family="monospace" fill="#1e40af">host = "mysql-db"</text>
  <text x="200" y="187" text-anchor="middle" font-size="8" fill="#3b82f6">↑ just the container NAME!</text>

  <!-- Arrow -->
  <line x1="298" y1="147" x2="405" y2="147" stroke="#2563eb" stroke-width="3" marker-end="url(#ar6)"/>
  <text x="352" y="138" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">connects by NAME</text>
  <text x="352" y="163" text-anchor="middle" font-size="8" fill="#3b82f6">Docker auto-resolves the IP ✨</text>

  <!-- MySQL container -->
  <rect x="410" y="100" width="180" height="95" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="500" y="127" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">🚢 mysql-db</text>
  <text x="500" y="149" text-anchor="middle" font-size="10" fill="#15803d">MySQL database</text>
  <text x="500" y="172" text-anchor="middle" font-size="10" fill="#16a34a">DB: user_info</text>
  <text x="500" y="187" text-anchor="middle" font-size="8" fill="#22c55e">no IP lookup needed ✅</text>

  <text x="350" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">❌ OLD WAY: host = "172.17.0.2"  (find IP manually, rebuild every time)</text>
  <text x="350" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">✅ NEW WAY: host = "mysql-db"  (container name — done!)</text>
</svg>
